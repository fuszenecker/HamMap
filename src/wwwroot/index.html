<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HamMap — Hungarian Amateur Radio Distribution</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    .panel {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,0.95); padding: 12px 14px; border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3); max-width: 280px; font-size: 13px;
    }
    .panel h1 { font-size: 15px; margin: 0 0 6px; }
    .panel .stats { color: #333; line-height: 1.5; }
    .panel .stats b { color: #b00; }
    .legend {
      position: absolute; bottom: 22px; right: 12px; z-index: 1000;
      background: rgba(255,255,255,0.95); padding: 8px 12px; border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3); font-size: 12px; line-height: 1.6;
    }
    .legend i { display:inline-block; width: 12px; height: 12px; border-radius: 50%;
      margin-right: 6px; opacity: 0.75; }
    .muted { color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h1>🇭🇺 Amateur Radio Distribution</h1>
    <div class="stats" id="stats">Loading…</div>
    <div class="muted" id="note"></div>
  </div>

  <div class="legend" id="legend"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="app.js"></script>
</body>
</html>
